<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  {% if page.title %}
  <title>{{ page.title }} | Marentis Labs</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  {% else %}
  <title>{{ site.title }} | {{ site.tagline }}</title>
  <meta name="description" content="{{ site.description }}" />
  {% endif %}

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | Marentis Labs{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:image" content="{{ site.url }}/assets/images/og-image.png" />

  <!-- Canonical (handled by jekyll-seo-tag) -->

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />

  <!-- Compiled CSS (replaces Tailwind CDN) -->
  <link rel="stylesheet" href="/assets/css/style.css" />

  <!-- Tocbot (article pages only) -->
  {% if page.layout == 'article' %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tocbot@4/dist/tocbot.css" />
  {% endif %}

  <!-- Schema.org structured data -->
  {% include schema.html %}

  <!-- Jekyll SEO tag -->
  {% seo %}
</head>
<body class="bg-white text-ml-charcoal">

  <!-- ── Navigation ──────────────────────────────────────────── -->
  {% include nav.html %}

  <!-- ── Page content ────────────────────────────────────────── -->
  <main>
    {{ content }}
  </main>

  <!-- ── Footer ──────────────────────────────────────────────── -->
  {% include footer.html %}

  <!-- ── Cookie consent ──────────────────────────────────────── -->
  {% include cookie-consent.html %}

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <!-- Google Analytics — loaded only after consent -->
  <script>
    if (localStorage.getItem('ml_cookie_consent') === 'accepted') {
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;
      j.src='https://www.googletagmanager.com/gtag/js?id=G-VB6Q21MBY5';
      f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','G-VB6Q21MBY5');
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VB6Q21MBY5');
    }
  </script>

  <script src="/assets/js/main.js" defer></script>
</body>
</html>
