<div id="cookie-consent-banner" role="dialog" aria-label="Cookie consent">
  <p>
    We use analytics cookies to understand how visitors use this site.
    <a href="/cookies/">Learn more</a>.
  </p>
  <div class="flex gap-3 flex-shrink-0">
    <button id="cookie-reject"
            class="text-sm px-4 py-2 rounded border border-gray-500 text-gray-300 hover:border-white hover:text-white transition">
      Reject
    </button>
    <button id="cookie-accept"
            class="btn-primary text-sm px-4 py-2 rounded">
      Accept
    </button>
  </div>
</div>
